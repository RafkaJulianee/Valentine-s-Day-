<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Valentine Letter</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Login Screen -->
    <div class="login-container" id="login-container">
        <div class="card">
            <h2>Admin Area</h2>
            <div class="form-group" style="margin-top: 15px;">
                <input type="password" id="admin-pass" placeholder="Enter password..." required>
            </div>
            <button id="login-btn" class="btn success-btn">Login</button>
            <p id="login-error" style="color: #f44336; font-size: 0.9rem; margin-top: 10px; display: none;">Incorrect password!</p>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div class="admin-container" id="admin-container" style="display: none;">
        <h1>Valentine Dashboard 💌</h1>
        
        <div class="card stats-card">
            <h2>Click History</h2>
            <div class="table-responsive">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Action</th>
                            <th>Time</th>
                        </tr>
                    </thead>
                    <tbody id="history-tbody">
                        <tr><td colspan="3" style="text-align: center;">Loading history...</td></tr>
                    </tbody>
                </table>
            </div>
            <div style="text-align: right; margin-top: 15px;">
                <button id="reset-stats" class="btn danger-btn" style="width: auto;">Clear History</button>
            </div>
        </div>
        
        <div class="nav-links">
            <a href="../index.html" class="link-btn">Go to Letter Page</a>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
