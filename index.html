<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="style.css" />
    <title>Valentine's Day Letter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A special Valentine's Day letter just for you! ❤️" />
    
    <!-- Open Graph for WhatsApp & Socials -->
    <meta property="og:title" content="Valentine's Day Letter 💌" />
    <meta property="og:description" content="Will you be my Valentine? Click to open your letter! 💖" />
    <meta property="og:image" content="https://media1.tenor.com/m/mZP3_J7UoDkAAAAC/mochi-cat.gif" />
    <meta property="og:url" content="https://valentine-letter-mauve.vercel.app/" />
    <meta property="og:type" content="website" />

    <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon">

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Aldrich&family=Pixelify+Sans:wght@400..700&display=swap"
      rel="stylesheet"
    />
  <body>
    <!-- Envelope Screen -->
    <div id="envelope-container">
      <img src="img/envelope.png" alt="Envelope" id="envelope" />
      <p id="envelope-text">♡ Letter for You ♡</p>
    </div>
    
    <audio id="bg-music" loop>
      <source src="audio/song.mp3" type="audio/mpeg" />
    </audio>

    <!-- Letter Screen -->
    <div id="letter-container">
      <div class="letter-window">
        <h1 id="letter-title">Will you be my Valentine?</h1>

        <img src="img/cat_heart.gif" class="cat" id="letter-cat" />

        <div class="buttons" id="letter-buttons">
          <img src="img/yes.png" class="btn yes-btn" alt="Yes" />

          <div class="no-wrapper">
            <img src="img/no.png" class="btn no-btn" alt="No" />
          </div>
        </div>

        <p id="final-text" class="final-text" style="display: none">
          <strong>Valentine Date:</strong> Meow Restaurant at 7pm. Dress fancy!
        </p>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
